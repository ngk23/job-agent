name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio flake8
    
    - name: Lint with flake8
      run: |
        flake8 agent/ --max-line-length=100 --ignore=E501,W503,F541,F841,W293,W291,F401,F811,F402,F824,W292,E731,F403,F822,E402,F821,E203,E741,E722
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t job-agent:test .
    
    - name: Test Docker image runs
      run: |
        docker run --rm job-agent:test python -c "from agent import __version__; print(__version__)"

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linters
      run: pip install flake8 black isort
    
    - name: Check formatting with black
      run: black --check agent/ tests/
    
    - name: Check import order with isort
      run: isort --check-only --profile black agent/ tests/
    
    - name: Run flake8
      run: flake8 agent/ --max-line-length=100 --ignore=E501,W503,F541,F841,W293,W291,F401,F811,F402,F824,W292,E731,F403,F822,E402,F821,E203,E741,E722

  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, docker, lint]
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Sync to Hugging Face Spaces
      uses: huggingface/huggingface-spaces-action@v0.1.0
      with:
        api_token: ${{ secrets.HF_TOKEN }}
        owner: ${{ vars.HF_SPACE_OWNER || 'Gouklkrishan' }}
        space_name: ${{ vars.HF_SPACE_NAME || 'job-agent' }}
        directory: .
        docker: true
        commit_message: |
          Auto-deploy from GitHub
          
          Commit: ${{ github.sha }}
          Message: ${{ github.event.head_commit.message }}
