# Docker Compose for Job Agent

services:
  # Run the job agent
  agent:
    build: .
    volumes:
      - ./profiles:/app/profiles
      - ./logs:/app/logs
      - ./resume.pdf:/app/resume.pdf:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AUTO_APPLY=false
      - MIN_SCORE=70
      - MAX_APPLICATIONS=10
      - HEADLESS=true
    profiles:
      - run
  
  # Run the web dashboard
  dashboard:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
    profiles:
      - dashboard
  
  # Development shell
  shell:
    build: .
    profiles:
      - dev
    stdin_open: true
    tty: true
    volumes:
      - .:/app