# Docker Compose for Job Agent

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_agent}
      POSTGRES_DB: job_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - pg
      - all

  # Run the job agent
  agent:
    build: .
    volumes:
      - ./profiles:/app/profiles
      - ./logs:/app/logs
      - ./resume.pdf:/app/resume.pdf:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AUTO_APPLY=false
      - MIN_SCORE=70
      - MAX_APPLICATIONS=10
      - HEADLESS=true
      - DATABASE_URL=${DATABASE_URL:-}
    profiles:
      - run
  
  # Run the web dashboard
  dashboard:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
      - DATABASE_URL=${DATABASE_URL:-}
    profiles:
      - dashboard
  
  # Development shell
  shell:
    build: .
    profiles:
      - dev
    stdin_open: true
    tty: true
    volumes:
      - .:/app

volumes:
  pgdata: